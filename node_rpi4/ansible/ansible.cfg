[defaults]
inventory = ./hosts.ini
log_path = /mnt/usb-data/services/ansible/ansible.log

# This forces the "local" and "remote" temp files into your RAM disk
remote_tmp = /tmp/ansible
local_tmp  = /tmp/ansible

# Optional: also keeps retry files off the SD card
retry_files_save_path = /tmp/ansible-retries

# Redirect Collections and Roles to the USB
collections_path = /mnt/usb-data/services/ansible/collections
roles_path = /mnt/usb-data/services/ansible/roles

# Redirect Module/Plugin paths to the USB
library = /mnt/usb-data/services/ansible/plugins/modules
