services:
  # Portainer Agent: Allows your central Portainer instance to manage this node
  portainer-agent:
    image: portainer/agent:2.19.4
    container_name: portainer_agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"

  # Watchtower: Automatically updates your containers when new images are released
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400 # Checks once every 24 hours

  # Dozzle: Real-time log viewer for all containers on this node
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

  # Beszel Agent: Sends CPU/RAM/Disk metrics to your Pi 4 Hub
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel_agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only access to monitor stats
    ports:
      - "4567:4567"
    environment:
      - KEY=${BESZEL_KEY} # Replace with Your Public Key from your Beszel Hub on the Pi